name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  web:
    name: Build web panel
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web panel
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Upload web assets
        uses: actions/upload-artifact@v7
        with:
          name: web-dist
          path: web/dist
          if-no-files-found: error

  build:
    name: Build ${{ matrix.goos }}/${{ matrix.goarch }}
    needs: web
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download web assets
        uses: actions/download-artifact@v8
        with:
          name: web-dist
          path: internal/assets/dist

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Build and package
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          version="${GITHUB_REF_NAME}"
          package="opencode-cc_${version}_${GOOS}_${GOARCH}"
          binary="opencode-cc"
          if [ "${GOOS}" = "windows" ]; then
            binary="${binary}.exe"
          fi

          mkdir -p "dist/${package}"
          go build -trimpath -ldflags="-s -w" -o "dist/${package}/${binary}" .
          cp README.md LICENSE "dist/${package}/"

          if [ "${GOOS}" = "windows" ]; then
            (
              cd dist
              zip -r "${package}.zip" "${package}"
            )
            echo "ASSET=dist/${package}.zip" >> "$GITHUB_ENV"
          else
            tar -C dist -czf "dist/${package}.tar.gz" "${package}"
            echo "ASSET=dist/${package}.tar.gz" >> "$GITHUB_ENV"
          fi

      - name: Upload release asset
        uses: actions/upload-artifact@v7
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: ${{ env.ASSET }}
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          pattern: release-*
          path: release-assets
          merge-multiple: true

      - name: Generate checksums
        working-directory: release-assets
        run: sha256sum * > checksums.txt

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release-assets/* \
            --verify-tag \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
