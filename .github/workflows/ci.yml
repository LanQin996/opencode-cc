name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build web panel
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Prepare embedded assets
        run: |
          rm -rf internal/assets/dist
          mkdir -p internal/assets/dist
          cp -R web/dist/. internal/assets/dist/

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Test
        run: go test ./...

      - name: Build
        env:
          CGO_ENABLED: 0
        run: go build -trimpath -ldflags="-s -w" -o opencode-cc .
